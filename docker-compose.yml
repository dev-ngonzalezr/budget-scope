services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: budget_scope
      POSTGRES_USER: budget_scope
      POSTGRES_PASSWORD: budget_scope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_scope -d budget_scope"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      MICRONAUT_ENVIRONMENTS: local
      DB_URL: jdbc:postgresql://postgres:5432/budget_scope
      DB_USERNAME: budget_scope
      DB_PASSWORD: budget_scope
      OIDC_JWKS_URL: https://issuer.example.com/.well-known/jwks.json
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
